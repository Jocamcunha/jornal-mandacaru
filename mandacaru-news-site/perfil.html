<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Mandacarú News</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pg-perfil">

  <header class="header">
    <div class="header__left">
      <div class="header__logo">🌵 Mandacarú News</div>
    </div>

    <nav class="header__nav header__nav--main">
      <a href="home.html">Notícias</a>
      <a href="clima.html">Clima</a>
      <a href="cultura.html">Cultura</a>
      <a href="tirinhas.html">Tirinhas</a>
    </nav>

    <div id="cotacao-dolar">
      <span class="cotacao-par">🇺🇸 USD/BRL</span>
      <span id="cotacao-valor">R$ --</span>
      <span id="cotacao-variacao"></span>
    </div>

    <div class="header__actions">
      <a href="perfil.html" class="header__perfil">
        👤
      </a>

      <input
        class="header__search"
        type="text"
        placeholder="Pesquisar..."
      >
    </div>
  </header>

  <main class="perfil-page">
    <section class="perfil-shell">
      <aside class="perfil-sidebar">
        <div class="perfil-sidebar__user">
          <img src="https://i.pravatar.cc/100?img=47" alt="avatar de Daniele">
          <div>
            <h3>Daniele Silva</h3>
            <p>daniele@gmail.com</p>
          </div>
        </div>

        <nav class="perfil-sidebar__nav" aria-label="Menu do perfil">
          <button type="button" class="perfil-sidebar__item active" data-perfil-tab="usuario">
            <span class="perfil-sidebar__item-icon">👤</span>
            <span>Nome de Usuário</span>
            <span class="perfil-sidebar__item-arrow">›</span>
          </button>
          <button type="button" class="perfil-sidebar__item" data-perfil-tab="salvos">
            <span class="perfil-sidebar__item-icon">🔖</span>
            <span>Salvos</span>
            <span class="perfil-sidebar__item-arrow">›</span>
          </button>
          <button type="button" class="perfil-sidebar__item" data-perfil-tab="configuracoes">
            <span class="perfil-sidebar__item-icon">⚙️</span>
            <span>Configurações</span>
            <span class="perfil-sidebar__item-arrow">›</span>
          </button>
          <button type="button" class="perfil-sidebar__item" data-perfil-tab="notificacoes">
            <span class="perfil-sidebar__item-icon">🔔</span>
            <span>Notificações</span>
            <span class="perfil-sidebar__item-arrow">›</span>
          </button>
        </nav>
      </aside>

      <section class="perfil-content">
        <div class="perfil-header">
          <div class="perfil-header__avatar-wrap">
            <img src="https://i.pravatar.cc/120?img=47" alt="avatar de Daniele">
            <button class="perfil-avatar-edit" type="button" aria-label="Editar foto">✎</button>
          </div>
          <div>
            <h1>Daniele Silva</h1>
            <p>daniele@gmail.com</p>
          </div>
        </div>

        <form class="perfil-form">
          <div class="perfil-field">
            <label for="perfil-nome-completo">Nome Completo</label>
            <input id="perfil-nome-completo" type="text" value="Daniele Silva">
          </div>

          <div class="perfil-field">
            <label for="perfil-nome-exibido">Nome exibido</label>
            <input id="perfil-nome-exibido" type="text" value="DaniSilva">
          </div>

          <div class="perfil-field">
            <label for="perfil-genero">Gênero</label>
            <select id="perfil-genero">
              <option>Feminino</option>
              <option>Masculino</option>
              <option>Prefiro não informar</option>
              <option>Outro</option>
            </select>
          </div>

          <div class="perfil-field">
            <label for="perfil-pais">País</label>
            <select id="perfil-pais">
              <option>Brasil</option>
              <option>Argentina</option>
              <option>Chile</option>
              <option>Colômbia</option>
              <option>Portugal</option>
            </select>
          </div>

          <div class="perfil-field perfil-field--full">
            <label for="perfil-email">Email Cadastrado</label>
            <input id="perfil-email" type="email" value="daniele@gmail.com">
          </div>

          <div class="perfil-field">
            <label for="perfil-celular">Número de Celular</label>
            <input id="perfil-celular" type="tel" value="(81) 98888-7766">
          </div>

          <div class="perfil-field">
            <label for="perfil-cidade">Localização / Cidade</label>
            <input id="perfil-cidade" type="text" value="Recife, PE">
          </div>

          <div class="perfil-form__actions">
            <button id="perfil-saveBtn" class="perfil-save-btn" type="button">Salvar Alterações</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
