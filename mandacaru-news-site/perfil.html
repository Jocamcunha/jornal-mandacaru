<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Mandacarú News</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pg-perfil">

  <header class="header">
    <div class="header__logo">🌵 Mandacarú News</div>
    <nav class="header__nav">
      <a href="home.html">Notícias</a>
      <a href="clima.html">Clima</a>
      <a href="culinaria.html">Cultura</a>
      <a href="tirinhas.html">Tirinhas</a>
    </nav>
  </header>

  <div class="perfil-container">

    <aside class="perfil-sidebar">
      <div class="perfil-sidebar__user">
        <img src="https://i.pravatar.cc/80" alt="avatar">
        <div>
          <h3>Daniele Silva</h3>
          <p>daniele@gmail.com</p>
        </div>
      </div>

      <ul class="perfil-sidebar__nav">
        <li class="active">👤 Nome de Usuário</li>
        <li>🔖 Salvos</li>
        <li>⚙️ Configurações</li>
        <li>🔔 Notificações</li>
      </ul>
    </aside>

    <main class="perfil-content">
      <div class="perfil-header">
        <img src="https://i.pravatar.cc/100" alt="avatar">
        <div>
          <h1>Daniele Silva</h1>
          <p>daniele@gmail.com</p>
        </div>
      </div>

      <div class="perfil-form">
        <div>
          <label>Nome Completo</label>
          <input value="Daniele Silva">
        </div>

        <div>
          <label>Nome exibido</label>
          <input value="DaniSilva">
        </div>

        <div>
          <label>Gênero</label>
          <select><option>Feminino</option></select>
        </div>

        <div>
          <label>País</label>
          <select><option>Brasil</option></select>
        </div>

        <div class="full">
          <label>Email</label>
          <input value="daniele@gmail.com">
        </div>

        <div>
          <label>Celular</label>
          <input value="(81) 98888-7766">
        </div>

        <div>
          <label>Cidade</label>
          <input value="Recife, PE">
        </div>
      </div>

      <button id="perfil-saveBtn" class="perfil-save-btn">Salvar Alterações</button>
    </main>

  </div>

  <script src="scripts.js"></script>
</body>
</html>
