<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandacarú News</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pg-home">

  <header class="header">
    <div class="header__logo">🌵 Mandacarú News</div>
    <nav class="header__nav">
      <a href="home.html" class="active">Notícias</a>
      <a href="clima.html">Clima</a>
      <a href="cultura.html">Cultura</a>
      <a href="tirinhas.html">Tirinhas</a>
    </nav>

    <div class="header__actions">
      <a href="perfil.html" class="header__perfil">
        👤
      </a>

      <input
        class="header__search"
        type="text"
        placeholder="Pesquisar..."
      >
    </div>
  </header>

  <section class="home-hero">
    <h1 class="home-hero__titulo">Festejos juninos começam no Nordeste</h1>
    <p>Cidades projetam faturamento histórico e grande movimentação turística.</p>
  </section>

  <!-- Botões de categoria -->
  <section class="home-cats">
    <button class="home-cats__btn ativo" data-categoria="todas">Todas</button>
    <button class="home-cats__btn" data-categoria="politica">Política</button>
    <button class="home-cats__btn" data-categoria="cultura">Cultura</button>
    <button class="home-cats__btn" data-categoria="turismo">Turismo</button>
    <button class="home-cats__btn" data-categoria="esporte">Esportes</button>
  </section>

  <main class="home-main">
    <h2>Notícias em destaque</h2>

    <!-- Os cards aparecem aqui automaticamente pelo JS -->
    <div id="lista-noticias"></div>

  </main>

  <footer class="footer">
    <p>© 2026 Mandacarú News - Projeto acadêmico.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
