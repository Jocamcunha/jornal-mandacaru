<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Jornal Mandacarú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sarabun:wght@400&family=Sora:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      font-family: 'Inter', Helvetica, sans-serif;
    }

    .page {
      position: relative;
      display: grid;
      min-height: 100vh;
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      overflow: hidden;
      background: #000;
      grid-template-columns: 1fr;
    }

    @media (min-width: 1024px) {
      .page { grid-template-columns: 1fr 674px; }
    }

    /* Left panel */
    .left {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
      padding: 33px 29px 48px;
      color: #fff;
    }

    @media (min-width: 1024px) {
      .left {
        border-radius: 0 32px 32px 0;
        padding: 33px 44px 48px 53px;
      }
    }

    .gradient-overlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 72% 55%, rgba(8,122,45,0.78), rgba(8,122,45,0.18) 20%, rgba(0,0,0,0) 38%),
        linear-gradient(203deg, rgba(169,169,169,0) 55%, rgba(169,169,169,0.2) 100%);
    }

    .bg-blur {
      pointer-events: none;
      position: absolute;
      inset-block: 0;
      left: 0;
      height: 100%;
      width: 828px;
      max-width: none;
      filter: blur(32.5px);
      object-fit: cover;
      opacity: 0.7;
    }

    header { position: relative; z-index: 10; }

    .login-text {
      text-align: center;
      font-size: 16px;
      font-weight: 400;
      color: #fff;
    }

    @media (min-width: 640px) { .login-text { text-align: left; } }

    .login-text a {
      color: #86bf89;
      background: none;
      border: none;
      cursor: pointer;
      font-size: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .login-text a:hover { opacity: 0.9; }

    .hero-img {
      margin-top: 38px;
      height: auto;
      width: 463px;
      max-width: 100%;
    }

    .tagline {
      position: relative;
      z-index: 10;
      margin-top: 12px;
      max-width: 611px;
      font-family: 'Sarabun', Helvetica, sans-serif;
      font-size: 25px;
      font-weight: 400;
      line-height: 50px;
      color: #fff;
    }

    /* Form section */
    .form-section {
      position: relative;
      z-index: 10;
      margin-top: 29px;
      width: 100%;
      max-width: 642px;
    }

    .form { display: flex; flex-direction: column; gap: 20px; }

    .input {
      width: 100%;
      height: auto;
      border-radius: 20px;
      border: none;
      background: #fff;
      padding: 16px 12px;
      font-size: 16px;
      color: #555c60;
      font-family: 'Inter', Helvetica, sans-serif;
      outline: none;
      box-shadow: 0 0 1px rgba(0,0,0,0.25);
      transition: box-shadow 0.2s;
    }
    .input::placeholder { color: #555c60; }
    .input:focus { box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }

    .submit-btn {
      margin-top: 17px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(90deg, rgba(2,81,51,1) 95%);
      font-family: 'Sora', Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #fff;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.95; }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .error-msg {
      display: none;
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      margin-top: -8px;
    }

    /* Right panel (photo) */
    .right {
      position: relative;
      display: none;
      min-height: 100vh;
    }
    @media (min-width: 1024px) { .right { display: block; } }

    .right img {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-label="Tela de cadastro">

      <!-- Left panel -->
      <div class="left">
        <div class="gradient-overlay" aria-hidden="true"></div>
        <img class="bg-blur" src="/figmaAssets/image-91.png" alt="" aria-hidden="true" />

        <header>
          <p class="login-text">
            Já tem uma conta? <a href="/login.html">Entrar</a>
          </p>
          <img
            class="hero-img"
            src="/figmaAssets/bem-vindo-ao-jornal-mandacar-.png"
            alt="Bem-vindo ao Jornal Mandacarú"
          />
        </header>

        <p class="tagline">
          Crie sua conta e fique por dentro de tudo que acontece no Nordeste.
        </p>

        <section class="form-section">
          <form class="form" onsubmit="handleSubmit(event)" novalidate>
            <input
              class="input"
              id="nome-input"
              type="text"
              placeholder="Nome completo"
              autocomplete="name"
              required
            />
            <input
              class="input"
              id="email-input"
              type="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
            <input
              class="input"
              id="senha-input"
              type="password"
              placeholder="Senha (mínimo 6 caracteres)"
              autocomplete="new-password"
              minlength="6"
              required
            />

            <p class="error-msg" id="error-msg"></p>

            <button type="submit" class="submit-btn" id="submit-btn">Criar conta</button>
          </form>
        </section>
      </div>

      <!-- Right panel -->
      <aside class="right" aria-hidden="true">
        <img src="/figmaAssets/image-90.png" alt="" />
      </aside>

    </section>
  </main>

  <script>
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    function handleSubmit(e) {
      e.preventDefault();
      hideError();

      const nome = document.getElementById('nome-input').value.trim();
      const email = document.getElementById('email-input').value.trim();
      const senha = document.getElementById('senha-input').value;

      if (!nome || !email || !senha) {
        showError('Preencha todos os campos.');
        return;
      }
      if (senha.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Criando conta...';
      btn.disabled = true;

      fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: email, password: senha, name: nome }),
      })
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data }) => {
          if (ok) {
            window.location.href = '/dashboard';
          } else {
            showError(data.message || 'Erro ao criar conta.');
            btn.textContent = 'Criar conta';
            btn.disabled = false;
          }
        })
        .catch(() => {
          showError('Erro de conexão. Tente novamente.');
          btn.textContent = 'Criar conta';
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
