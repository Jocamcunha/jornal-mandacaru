<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Jornal Mandacarú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sarabun:ital,wght@1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="pg-auth">
  <main class="auth-page">
    
    <div class="auth-left">
      <div class="auth-gradient"></div>
      
      <header class="auth-header">
        <p class="auth-switch-text">Já tem uma conta? <a href="login.html">Entrar</a></p>
        <h1 class="auth-title">Crie sua conta no<br><span class="color-red">Jornal</span> <span class="color-green">Mandacarú</span></h1>
      </header>

      <p class="auth-tagline">
        Crie sua conta e fique por dentro de tudo que acontece no Nordeste.
      </p>

      <form class="auth-form" id="form-cadastro">
        <input class="auth-input" id="nome-input" type="text" placeholder="Nome completo" required />
        <input class="auth-input" id="email-input" type="email" placeholder="Email" required />
        <input class="auth-input" id="senha-input" type="password" placeholder="Senha (mínimo 6 caracteres)" minlength="6" required />
        
        <p class="auth-error-msg" id="error-msg"></p>

        <button type="submit" class="auth-submit-btn" id="submit-btn">Criar conta</button>
      </form>
    </div>

    <aside class="auth-right">
      <img src="https://images.unsplash.com/photo-1550184658-ff6132a71714?q=80&w=1000&auto=format&fit=crop" alt="Cacto Mandacarú" />
    </aside>

  </main>

  <script src="scripts.js"></script>
</body>
</html>
